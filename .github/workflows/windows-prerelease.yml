name: Windows prerelease
run-name: Windows prerelease (${{ github.event_name }} @ ${{ github.ref_name }})

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # Touch this workflow when we need a fresh beta rebuild from main fixes.
      # Keep this workflow self-triggerable for refreshed prerelease assets.
      # Beta refresh includes locale, default-download, release upload retry, and MIT attribution updates.
      # 2026-04-25: refresh prerelease assets after the FACEIT scouting re-extraction fix.
      # 2026-04-25: refresh prerelease assets after the FACEIT manual-download filename compatibility fix.
      - .github/workflows/windows-prerelease.yml

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish Windows prerelease
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure workflow runs from main
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -ne "main") {
            throw "This workflow must be run from the main branch."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Read release metadata
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=cs-analyzer-v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NAME=CS Analyzer $version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release secrets
        shell: pwsh
        env:
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FACEIT_API_KEY)) {
            throw "Missing repository secret: FACEIT_API_KEY"
          }

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}

      - name: Package Windows artifacts
        run: npm run package -- --win --x64
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:RELEASE_TAG
          $releaseName = $env:RELEASE_NAME
          $assets = @(
            "dist/CS Analyzer Setup $($env:RELEASE_VERSION).exe",
            "dist/CS Analyzer Portable $($env:RELEASE_VERSION).exe",
            "TESTING-GUIDE.en.md",
            "TESTING-GUIDE.zh-CN.md"
          )

          & gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release edit $tag --title $releaseName --notes-file .github/release-body.md --prerelease
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update prerelease metadata for $tag."
            }
          }
          else {
            & gh release create $tag --title $releaseName --notes-file .github/release-body.md --prerelease
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create prerelease $tag."
            }
          }

          foreach ($asset in $assets) {
            $uploaded = $false

            for ($attempt = 1; $attempt -le 5 -and -not $uploaded; $attempt++) {
              Write-Host "Uploading $asset (attempt $attempt/5)..."
              & gh release upload $tag $asset --clobber

              if ($LASTEXITCODE -eq 0) {
                $uploaded = $true
                continue
              }

              if ($attempt -lt 5) {
                $delay = [Math]::Min(30, $attempt * 5)
                Write-Warning "Upload failed for $asset, retrying in $delay seconds."
                Start-Sleep -Seconds $delay
              }
            }

            if (-not $uploaded) {
              throw "Failed to upload $asset after multiple attempts."
            }
          }
