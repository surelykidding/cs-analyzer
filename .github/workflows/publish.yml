name: Publish new release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Select the release type
        required: true
        options:
          - patch
          - minor
      sign-macos:
        type: boolean
        description: Sign and notarize macOS artifacts with Apple certificate secrets
        required: true
        default: false

permissions:
  contents: write

jobs:
  ensure-changes:
    name: Ensure there are changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to get all existing tags
          fetch-tags: true

      - name: Stop if there are no new changes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --always)
          LAST_COMMIT=$(git rev-parse HEAD)
          LASTEST_TAG_COMMIT=$(git rev-list -n 1 $LATEST_TAG)
          if [ "$LASTEST_TAG_COMMIT" == "$LAST_COMMIT" ]; then
            echo "No new changes since the last tag. Stopping the workflow."
            exit 1
          fi
          exit 0

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: ensure-changes

    steps:
      - name: Validate Apple signing secrets
        if: ${{ github.event.inputs['sign-macos'] == 'true' }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error title=Missing Apple signing secret::APPLE_APPLICATION_CERTIFICATE, APPLE_P12_PASSWORD, and KEYCHAIN_PASSWORD are required when sign-macos is enabled."
            exit 1
          fi
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Install Apple certificate
        if: ${{ github.event.inputs['sign-macos'] == 'true' }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          if ! echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH; then
            echo "::error title=Invalid Apple certificate secret::APPLE_APPLICATION_CERTIFICATE must be a base64-encoded .p12 certificate."
            exit 1
          fi

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          if ! security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH; then
            echo "::error title=Invalid Apple certificate::Decoded APPLE_APPLICATION_CERTIFICATE is not an importable .p12 certificate, or APPLE_P12_PASSWORD is incorrect."
            exit 1
          fi
          security list-keychain -d user -s $KEYCHAIN_PATH
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Disable macOS code signing
        if: ${{ github.event.inputs['sign-macos'] != 'true' }}
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Install required tools
        run: |
          brew install python-setuptools

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.mod
          cache-dependency-path: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.sum

      - name: Create new version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm version ${{ github.event.inputs.release-type }} -m "chore: v%s"

      - name: Package macOS artifacts
        run: |
          npm install
          npm run build
          npm run package -- --mac --publish never
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
          APPLE_ID: ${{ github.event.inputs['sign-macos'] == 'true' && secrets.APPLE_ID || '' }}
          APPLE_TEAM_ID: ${{ github.event.inputs['sign-macos'] == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ github.event.inputs['sign-macos'] == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}

      - name: Validate macOS artifact names
        run: |
          if find dist -maxdepth 1 -type f -iname '*cs-demo-manager*' | grep -q .; then
            echo "::error title=Unexpected artifact name::Found cs-demo-manager artifact in dist."
            find dist -maxdepth 1 -type f -iname '*cs-demo-manager*'
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            !dist/builder-debug.yml
            dist/*.blockmap
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: ensure-changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.mod
          cache-dependency-path: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.sum

      - name: Create new version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm version ${{ github.event.inputs.release-type }} -m "chore: v%s"

      - name: Package Linux artifacts
        run: |
          npm install
          npm run build
          npm run package -- --linux --publish never
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}

      - name: Validate Linux artifact names
        run: |
          if find dist -maxdepth 1 -type f -iname '*cs-demo-manager*' | grep -q .; then
            echo "::error title=Unexpected artifact name::Found cs-demo-manager artifact in dist."
            find dist -maxdepth 1 -type f -iname '*cs-demo-manager*'
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.yml
            !dist/builder-debug.yml
            dist/*.blockmap
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: ensure-changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.mod
          cache-dependency-path: tools/demo-analyzer/cs-demo-analyzer-enhanced/go.sum

      - name: Create new version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm version ${{ github.event.inputs.release-type }} -m "chore: v%s"

      - name: Package Windows artifacts
        run: |
          npm install
          npm run build
          npm run package -- --win --publish never
        env:
          STEAM_API_KEYS: ${{ secrets.STEAM_API_KEYS }}
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}

      - name: Validate Windows artifact names
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $expectedAssets = @(
            "CS Analyzer Setup $version.exe",
            "CS Analyzer Portable $version.exe"
          )
          $unexpectedAssets = Get-ChildItem dist -File | Where-Object { $_.Name -like '*cs-demo-manager*' }
          if ($unexpectedAssets.Count -gt 0) {
            $unexpectedAssets | ForEach-Object { Write-Error "Unexpected artifact: $($_.FullName)" }
            throw "Found cs-demo-manager artifact in dist."
          }
          foreach ($asset in $expectedAssets) {
            if (-not (Test-Path (Join-Path dist $asset))) {
              throw "Missing expected artifact: $asset"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/CS Analyzer Setup *.exe
            dist/CS Analyzer Portable *.exe
            dist/*.yml
            !dist/builder-debug.yml
            dist/*.blockmap
          if-no-files-found: error

  publish-on-github:
    name: Publish on GitHub
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Create new version
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          npm version ${{ github.event.inputs.release-type }} -m "chore: v%s"
          VERSION=$(node -p "require('./package.json').version")
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=cs-analyzer-v$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=CS Analyzer $VERSION" >> "$GITHUB_ENV"

      - name: Push the tag to GitHub
        run: git push origin main --tags

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Validate release artifacts
        run: |
          find release-artifacts -type f -name builder-debug.yml -delete

          if find release-artifacts -type f -iname '*cs-demo-manager*' | grep -q .; then
            echo "::error title=Unexpected artifact name::Found cs-demo-manager artifact in release artifacts."
            find release-artifacts -type f -iname '*cs-demo-manager*'
            exit 1
          fi

          DUPLICATE_ASSETS=$(find release-artifacts -type f -printf '%f\n' | sort | uniq -d)
          if [ -n "$DUPLICATE_ASSETS" ]; then
            echo "::error title=Duplicate release asset names::Release assets must have unique file names."
            echo "$DUPLICATE_ASSETS"
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --generate-notes
          fi

          find release-artifacts -type f -print0 | xargs -0 gh release upload "$RELEASE_TAG" --clobber
